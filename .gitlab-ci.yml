stages:
  - lint
  - smoke_test
  - report
  - notify

# ============================================================
# ① lint — 代码检查
# ============================================================
lint:
  stage: lint
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH && $CI_COMMIT_BRANCH =~ /^feat|bugfix|hotfix\//
  before_script:
    - python3 -m pip install flake8 --quiet --break-system-packages
  script:
    - python3 -m flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
  tags:
    - api

# ============================================================
# ② smoke_test — 冒烟测试
# ============================================================
smoke_test:
  stage: smoke_test
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH && $CI_COMMIT_BRANCH =~ /^feat|bugfix|hotfix\//
  before_script:
    - python3 -m pip install -r requirements.txt --quiet --break-system-packages
    - python3 -m pip install allure-pytest --quiet --break-system-packages
  script:
    - python3 -m pytest testcases/ -v --tb=short -m order --alluredir report/allure-results
  after_script:
    - echo "smoke_test done"
  artifacts:
    when: always
    paths:
      - report/allure-results/
    expire_in: 7 days
  needs:
    - lint
  tags:
    - api

# ============================================================
# ③ report — 生成 Allure HTML 报告并部署到 GitLab Pages
# ============================================================
allure_report:
  stage: report
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH && $CI_COMMIT_BRANCH =~ /^feat|bugfix|hotfix\//
  script:
    - |
      echo "Generating Allure report..."
      allure generate report/allure-results -o report/allure-report --clean
      echo "Allure report generated successfully"
  artifacts:
    when: always
    paths:
      - report/allure-report/
    expire_in: 7 days
  needs:
    - smoke_test
  tags:
    - api

# ============================================================
# ④ pages — 部署 Allure 报告到 GitLab Pages
# ============================================================
pages:
  stage: report
  script:
    - mkdir -p public
    - mv report/allure-report public/
  artifacts:
    paths:
      - public
    expire_in: 7 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH && $CI_COMMIT_BRANCH =~ /^feat|bugfix|hotfix\//
  tags:
    - api

# ============================================================
# ⑤ notify — 企微通知
# ============================================================
notify:
  stage: notify
  variables:
    ALLURE_REPORT_URL: "$CI_PAGES_URL/index.html"
  script:
    - |
      if [ -f "notify.py" ]; then
        python3 notify.py
      else
        echo "notify.py not found, skipping..."
      fi
  needs:
    - pages
  tags:
    - api
