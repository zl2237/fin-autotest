stages:
  - lint
  - smoke_test
  - report
  - pages       # 把 pages 单独一个阶段，确保顺序执行
  - notify

# ============================================================
# ① lint — 代码检查
# ============================================================
lint:
  stage: lint
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH && $CI_COMMIT_BRANCH =~ /^feat|bugfix|hotfix\//
  before_script:
    - python3 -m pip install flake8 --break-system-packages
  script:
    - python3 -m flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
  tags:
    - api

# ============================================================
# ② smoke_test — 冒烟测试
# ============================================================
smoke_test:
  stage: smoke_test
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH && $CI_COMMIT_BRANCH =~ /^feat|bugfix|hotfix\//
  before_script:
    - python3 -m pip install -r requirements.txt --break-system-packages
  script:
    - mkdir -p report/allure-results
    - python3 -m pytest testcases/ -v -m order --alluredir report/allure-results
  artifacts:
    when: always
    paths:
      - report/
    expire_in: 7 days
  needs:
    - lint
  tags:
    - api

# ============================================================
# ③ 生成 Allure HTML 报告
# ============================================================
allure_report:
  stage: report
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH && $CI_COMMIT_BRANCH =~ /^feat|bugfix|hotfix\//
  script:
    - allure generate report/allure-results -o report/allure-report --clean
  artifacts:
    when: always
    paths:
      - report/allure-report/
  needs:
    - smoke_test
  tags:
    - api

# ============================================================
# ④ 部署到 GitLab Pages（必须叫 pages）
# ============================================================
pages:
  stage: pages
  script:
    - mkdir -p public
    - cp -r report/allure-report/* public/
  artifacts:
    paths:
      - public
    expire_in: 7 days
  needs:
    - allure_report
  tags:
    - api

# ============================================================
# ⑤ 企微通知（自动带上 Pages 报告链接）
# ============================================================
notify:
  stage: notify
  variables:
    ALLURE_REPORT_URL: "$CI_PAGES_URL/index.html"
  script:
    - |
      if [ -f "notify.py" ]; then
        python3 notify.py
      else
        echo "notify.py 不存在，跳过通知"
      fi
  needs:
    - smoke_test
    - pages
  tags:
    - api