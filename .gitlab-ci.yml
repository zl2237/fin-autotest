stages:
  - lint
  - smoke_test
  - notify

# ① 代码检查
lint:
  stage: lint
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH && $CI_COMMIT_BRANCH =~ /^feat|bugfix|hotfix\//
  before_script:
    - python3 -m pip install flake8 --break-system-packages
  script:
    - python3 -m flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
  tags:
    - api

# ② 冒烟测试
smoke_test:
  stage: smoke_test
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH && $CI_COMMIT_BRANCH =~ /^feat|bugfix|hotfix\//
  before_script:
    - python3 -m pip install -r requirements.txt --break-system-packages
  script:
    - mkdir -p report/allure-results
    - python3 -m pytest testcases/ -m link8 --alluredir report/allure-results
  after_script:
    - echo "smoke_test done"
  artifacts:
    when: always
    paths:
      - report/
    expire_in: 7 days
  needs:
    - lint
  tags:
    - api

# ③ 企微通知
notify:
  stage: notify
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH && $CI_COMMIT_BRANCH =~ /^feat|bugfix|hotfix\//
  script:
    - python3 notify.py
  needs:
    - job: smoke_test
      optional: true
  tags:
    - api
